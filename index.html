<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glowing Image Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="main">
    <h3>Traditional in Saree</h3>
    <img class="glow-image" src="Bride.png" alt="Traditional Look" />
    <p class="caption">Grace wrapped in tradition.</p>
    <div class="button-group">
      <button class="btn"  id="likeBtn" onclick="toggleLike()">Like</button>
      <button class="btn">Download</button>
      <button class="btn">Share</button>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
