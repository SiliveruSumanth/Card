<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glowing Image Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    @keyframes glowBorder {
      0% {
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.4),
                    0 0 20px rgba(0, 255, 0, 0.3),
                    0 0 30px rgba(0, 255, 0, 0.2);
      }
      50% {
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.8),
                    0 0 30px rgba(0, 255, 0, 0.6),
                    0 0 40px rgba(0, 255, 0, 0.5);
      }
      100% {
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.4),
                    0 0 20px rgba(0, 255, 0, 0.3),
                    0 0 30px rgba(0, 255, 0, 0.2);
      }
    }

    .main {
      width: 340px;
      height: 550px;
      background-color: bisque;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 2px solid #0f0;
      animation: glowBorder 2s infinite ease-in-out;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      transition: transform 1s ease-in-out;
    }

    h3 {
      font-family: 'Great Vibes', cursive;
      color: #070707;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      font-size: 40px;
      margin: 0;
    }

    .glow-image {
      width: 220px;
      margin: 0 auto;
       filter: brightness(1.1) contrast(1.2);
       image-rendering: auto;
       }
    .caption {
      font-family: 'Great Vibes', cursive;
      font-size: 26px;
      color: #070707;
      margin: 5px 0;
    }

    .button-group {
      display: flex;
      justify-content: space-evenly;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 16px;
      background-color: #070707;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #1e1e1e;
    }

    @media (max-width: 400px) {
      .main {
        width: 90%;
        height: auto;
      }

      .glow-image {
        width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="main">
    <h3>Traditional in Saree</h3>
    <img class="glow-image" src="https://i.postimg.cc/fVYRcwgm/geethu1-removebg-preview.png" alt="Traditional Look" />
    <p class="caption">Grace wrapped in tradition.</p>
    <div class="button-group">
      <button class="btn"  id="likeBtn" onclick="toggleLike()">Like</button>
      <button class="btn">Download</button>
      <button class="btn">Share</button>
    </div>
  </div>
  <script>
    let liked = false;

    function toggleLike() {
      const btn = document.getElementById('likeBtn');
      liked = !liked;

      if (liked) {
        btn.classList.add('liked');
        btn.textContent = 'Liked ❤️';
      } else {
        btn.classList.remove('liked');
        btn.textContent = 'Like';
      }
    }
  </script>
</body>
</html>
